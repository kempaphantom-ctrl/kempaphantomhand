<style>
    .league-table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 20px 0;
    }
    .league-table {
        width: 100%;
        min-width: 700px; /* テーブル全体の最小幅をここに指定 */
        border-collapse: collapse;
        text-align: center;
        font-size: 0.85rem;
        border: 2px solid #1a365d;
        background-color: white;
        table-layout: fixed; /* 列の幅を固定・均等にするための設定 */
    }
    .league-table th, 
    .league-table td {
        padding: 10px;
        border: 1px solid #cbd5e0;
        word-break: break-all;
    }
    .league-table thead tr {
        background-color: #1a365d;
        color: white;
    }
    
    /* 各列の横幅バランスを調整 */
    .league-table th.col-team { width: 100px; } /* チーム名列 */
    .league-table th.col-vs { width: auto; }    /* 対戦チーム列（残りの幅を均等に分ける） */
    .league-table th.col-pts { width: 60px; background-color: #2b6cb0; } /* 勝点列 */
    
    .league-table td.row-team {
        font-weight: bold;
        background-color: #f7fafc;
    }
    .league-table td.cell-blank {
        background-color: #a0aec0;
    }
    .league-table td.cell-pts {
        font-weight: bold;
        background-color: #edf2f7;
    }
    .league-table .score {
        font-size: 0.75rem;
        color: #718096;
        display: block;
        margin-top: 2px;
    }
</style>
